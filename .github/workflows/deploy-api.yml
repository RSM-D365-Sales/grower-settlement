name: Deploy API to Azure Functions

on:
  push:
    branches: [main]
    paths: ['api/**', '.github/workflows/deploy-api.yml']
  workflow_dispatch:

jobs:
  deploy:
    # Skips until an Azure Function App exists and AZURE_FUNCTIONAPP_NAME is
    # set as a repository variable (see Docs/SETUP.md).
    if: ${{ vars.AZURE_FUNCTIONAPP_NAME != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Drop dev dependencies for packaging
        run: npm prune --omit=dev
      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          # Create the Function App first (infra/main.bicep), then save its
          # publish profile as the AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret
          # and the app name as the AZURE_FUNCTIONAPP_NAME variable.
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
